<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">

  <!-- ── Gear ring (12 teeth at 30° intervals) ── -->
  <g fill="#C9A84C" stroke="none">
    <rect x="48" y="2"  width="4" height="7" transform="rotate(0   50 50)"/>
    <rect x="48" y="2"  width="4" height="7" transform="rotate(30  50 50)"/>
    <rect x="48" y="2"  width="4" height="7" transform="rotate(60  50 50)"/>
    <rect x="48" y="2"  width="4" height="7" transform="rotate(90  50 50)"/>
    <rect x="48" y="2"  width="4" height="7" transform="rotate(120 50 50)"/>
    <rect x="48" y="2"  width="4" height="7" transform="rotate(150 50 50)"/>
    <rect x="48" y="2"  width="4" height="7" transform="rotate(180 50 50)"/>
    <rect x="48" y="2"  width="4" height="7" transform="rotate(210 50 50)"/>
    <rect x="48" y="2"  width="4" height="7" transform="rotate(240 50 50)"/>
    <rect x="48" y="2"  width="4" height="7" transform="rotate(270 50 50)"/>
    <rect x="48" y="2"  width="4" height="7" transform="rotate(300 50 50)"/>
    <rect x="48" y="2"  width="4" height="7" transform="rotate(330 50 50)"/>
  </g>

  <!-- ── Outer ring ── -->
  <circle cx="50" cy="50" r="41" stroke="#C9A84C" stroke-width="1.2"/>

  <!-- ── Mid dashed ring ── -->
  <circle cx="50" cy="50" r="33" stroke="#C9A84C" stroke-width="0.6"
          stroke-dasharray="2.5 3" opacity="0.55"/>

  <!-- ── Cardinal ticks (between gear and ring) ── -->
  <line x1="50" y1="9"  x2="50" y2="13" stroke="#C9A84C" stroke-width="1.5"/>
  <line x1="50" y1="87" x2="50" y2="91" stroke="#C9A84C" stroke-width="1.5"/>
  <line x1="9"  y1="50" x2="13" y2="50" stroke="#C9A84C" stroke-width="1.5"/>
  <line x1="87" y1="50" x2="91" y2="50" stroke="#C9A84C" stroke-width="1.5"/>

  <!-- ── Eye / lens shape ── -->
  <path d="M 18 50 Q 50 22 82 50 Q 50 78 18 50 Z"
        stroke="#C9A84C" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- ── Iris ring ── -->
  <circle cx="50" cy="50" r="11" stroke="#C9A84C" stroke-width="1.4"/>

  <!-- ── Inner iris detail (tiny dashes) ── -->
  <circle cx="50" cy="50" r="7.5" stroke="#C9A84C" stroke-width="0.5"
          stroke-dasharray="1.5 2" opacity="0.5"/>

  <!-- ── Pupil ── -->
  <circle cx="50" cy="50" r="3.5" fill="#C9A84C"/>

  <!-- ── Vertical axis through eye (the quill) ── -->
  <line x1="50" y1="22" x2="50" y2="39"
        stroke="#C9A84C" stroke-width="0.7" opacity="0.45"/>
  <line x1="50" y1="61" x2="50" y2="78"
        stroke="#C9A84C" stroke-width="0.7" opacity="0.45"/>

  <!-- ── Intercardinal corner dots ── -->
  <circle cx="79" cy="21" r="1.2" fill="#C9A84C" opacity="0.5"/>
  <circle cx="21" cy="21" r="1.2" fill="#C9A84C" opacity="0.5"/>
  <circle cx="79" cy="79" r="1.2" fill="#C9A84C" opacity="0.5"/>
  <circle cx="21" cy="79" r="1.2" fill="#C9A84C" opacity="0.5"/>

</svg>
